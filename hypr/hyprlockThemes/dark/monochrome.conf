# TEXT COLORS
$text-primary = rgb(ffffff)
$text-primary-alpha = ffffff
$text-secondary = rgb(aaaaaa)
$text-secondary-alpha = aaaaaa
$text-tertiary = rgb(888888)
$text-tertiary-alpha = 888888

# BACKGROUND COLORS (dark to light)
$bg-deepest = rgb(000000)
$bg-deepest-alpha = 000000
$bg-darker = rgb(000000)
$bg-darker-alpha = 000000
$bg-dark = rgb(000000)
$bg-dark-alpha = 000000

# SURFACE COLORS (for UI elements)
$surface-dark = rgb(1a1a1a)
$surface-dark-alpha = 1a1a1a
$surface-medium = rgb(262626)
$surface-medium-alpha = 262626
$surface-light = rgb(333333)
$surface-light-alpha = 333333

# OVERLAY COLORS (for disabled/disabled states)
$overlay-dark = rgb(333333)
$overlay-dark-alpha = 333333
$overlay-medium = rgb(666666)
$overlay-medium-alpha = 666666
$overlay-light = rgb(888888)
$overlay-light-alpha = 888888

# ACCENT COLORS (main theme color)
$accent-primary = rgb(ffffff)      # Pure white borders (SDDM-style)
$accent-primary-alpha = ffffff

# SEMANTIC COLORS — grayscale only
$semantic-error = rgb(ffffff)
$semantic-error-alpha = ffffff
$semantic-warning = rgb(aaaaaa)
$semantic-warning-alpha = aaaaaa
$semantic-success = rgb(cccccc)
$semantic-success-alpha = cccccc
$semantic-info = rgb(888888)
$semantic-info-alpha = 888888

# UTILITY COLORS (miscellaneous)
$utility-blue = rgb(ffffff)
$utility-blue-alpha = ffffff
$utility-cyan = rgb(cccccc)
$utility-cyan-alpha = cccccc
$utility-green = rgb(aaaaaa)
$utility-green-alpha = aaaaaa
$utility-yellow = rgb(888888)
$utility-yellow-alpha = 888888
$utility-orange = rgb(666666)
$utility-orange-alpha = 666666
$utility-red = rgb(ffffff)
$utility-red-alpha = ffffff
$utility-purple = rgb(bbbbbb)
$utility-purple-alpha = bbbbbb
